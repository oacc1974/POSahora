services:
  - type: web
    name: backend-admin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: ADMIN_DB_NAME
        value: admin_db
      - key: FE_DB_NAME
        value: fe_db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: BACKEND_FE_URL
        sync: false
